---
- name: Restart Apache server
  hosts: all
  tasks:
    - name: Restart Apache2 service
      ansible.builtin.service:
      when: ansible_os_family == "Debian"
        name: apache2
        state: restarted

    - name: Restart HTTPD service
      ansible.builtin.service:
      when: ansible_os_family == "RedHat"
        name: httpd
        state: restarted
