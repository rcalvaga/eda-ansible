---
- name: Zabbix Test Rulebook
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Zabbix Debug Events
      condition: event.payload is defined
      action:
        debug: 
          msg: "Payload defined! with Event: {{ event.payload.event_name }} and Operation: {{ event.payload.operation_data }} and Trigger_ID: {{ event.payload.trigger_id }}"
          
    - name: Zabbix Apache is Down Event
      condition: event.payload is defined
      action:
        run_job_template:
          name: Restart Apache Web Server
          organization: Default
